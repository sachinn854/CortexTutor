<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CortexTutor — AI Learning Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css?v=5">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-brand">
            <div class="brand-logo">✦</div>
            <div class="brand-text">
                <span class="brand-name">CortexTutor</span>
                <span class="brand-sub">AI Learning Assistant</span>
            </div>
        </div>
        <div class="video-status" id="video-status">
            <span class="status-dot"></span>
            <span id="video-status-text">No video loaded</span>
        </div>
    </header>

    <!-- Messages -->
    <main class="main">
        <div class="messages" id="messages"></div>
    </main>

    <!-- Input Footer -->
    <footer class="input-footer">
        <div class="input-shell">
            <div class="quick-actions" id="quick-actions">
                <button class="action-chip" onclick="triggerStudyCommand('notes')">📝 Notes</button>
                <button class="action-chip" onclick="triggerStudyCommand('mcqs')">❓ MCQs</button>
            </div>
            <div class="input-row">
                <input
                    type="text"
                    id="user-input"
                    placeholder="Paste a YouTube URL to start..."
                    autocomplete="off"
                />
                <button id="send-btn" class="send-btn" title="Send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
                    </svg>
                </button>
            </div>
            <p class="input-hint">Enter to send &nbsp;·&nbsp; /notes &nbsp;·&nbsp; /mcqs</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/app.js?v=5"></script>
</body>
</html>
